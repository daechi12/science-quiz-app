<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>중3 과학 위치에너지 쪽지시험</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --sub: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(79,70,229,.25);
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: 12px; opacity: .8; margin-top: 2px; }

    /* ── Progress ── */
    .progress-wrap { padding: 0; margin-top: 10px; }
    .progress-bar-bg {
      height: 7px; background: rgba(255,255,255,.35);
      border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #fff;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: rgba(255,255,255,.85);
      margin-top: 4px;
    }

    /* ── Reference Box ── */
    .ref-box {
      margin: 16px 16px 0;
      background: #eff6ff;
      border: 1.5px solid #bfdbfe;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .ref-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .ref-item {
      background: #fff; border-radius: 10px;
      padding: 8px 10px; font-size: 12px; line-height: 1.5;
      border: 1px solid #dbeafe;
    }
    .ref-item strong { color: var(--primary); }
    .ref-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: #1d4ed8;
      cursor: pointer; user-select: none;
    }
    .ref-toggle .arrow { transition: transform .25s; font-style: normal; }
    .ref-toggle.collapsed .arrow { transform: rotate(-90deg); }
    .ref-content {
      overflow: hidden;
      max-height: 500px;
      transition: max-height .3s ease;
    }
    .ref-content.collapsed { max-height: 0; }

    /* ── Main container ── */
    main { padding: 16px; padding-bottom: 40px; }

    /* ── Part label ── */
    .part-label {
      font-size: 11px; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--primary);
      background: #ede9fe; border-radius: 99px;
      display: inline-block; padding: 3px 10px;
      margin-bottom: 8px;
    }

    /* ── Question Card ── */
    .q-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 2px solid transparent;
      transition: border-color .2s;
    }
    .q-card.answered-correct { border-color: var(--success); }
    .q-card.answered-wrong   { border-color: var(--error); }

    .q-num  { font-size: 11px; color: var(--sub); font-weight: 700; margin-bottom: 6px; }
    .q-text { font-size: 15px; font-weight: 500; line-height: 1.6; margin-bottom: 4px; }
    .q-hint {
      font-size: 12px; color: #7c3aed;
      background: #f5f3ff; border-radius: 8px;
      padding: 6px 10px; margin: 8px 0;
    }
    .q-score-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      background: #ede9fe; color: var(--primary); border-radius: 99px;
      padding: 2px 8px; margin-bottom: 10px;
    }

    /* ── OX Buttons ── */
    .ox-wrap { display: flex; gap: 10px; margin-top: 12px; }
    .ox-btn {
      flex: 1; min-height: 56px; font-size: 28px;
      border: 2px solid var(--border);
      border-radius: 12px; background: #fff;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900;
    }
    .ox-btn:active { transform: scale(.95); }
    .ox-btn.selected-correct { background: var(--success-bg); border-color: var(--success); }
    .ox-btn.selected-wrong   { background: var(--error-bg);   border-color: var(--error); }
    .ox-btn.correct-highlight { background: var(--success-bg); border-color: var(--success); }
    .ox-btn:disabled { cursor: default; }

    /* ── MC Buttons ── */
    .mc-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .mc-btn {
      width: 100%; min-height: 50px;
      text-align: left; padding: 12px 14px;
      font-size: 14px; font-family: inherit; font-weight: 500;
      border: 2px solid var(--border);
      border-radius: 12px; background: #fff;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 10px;
    }
    .mc-btn:active { transform: scale(.98); }
    .mc-btn .mc-letter {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); color: var(--primary);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mc-btn.selected-correct { background: var(--success-bg); border-color: var(--success); }
    .mc-btn.selected-wrong   { background: var(--error-bg);   border-color: var(--error); }
    .mc-btn.correct-highlight { background: var(--success-bg); border-color: var(--success); }
    .mc-btn:disabled { cursor: default; }

    /* ── Number Input ── */
    .num-wrap { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
    .num-input {
      flex: 1; height: 52px; font-size: 18px; font-weight: 700;
      text-align: center; font-family: inherit;
      border: 2px solid var(--border); border-radius: 12px;
      background: #fff; color: var(--text);
      outline: none; transition: border-color .15s;
      -webkit-appearance: none; appearance: none;
    }
    .num-input:focus { border-color: var(--primary); }
    .num-input.correct { border-color: var(--success); background: var(--success-bg); }
    .num-input.wrong   { border-color: var(--error);   background: var(--error-bg); }
    .num-input:disabled { cursor: default; }
    .num-unit { font-size: 14px; color: var(--sub); font-weight: 700; white-space: nowrap; }
    .submit-btn {
      height: 52px; padding: 0 18px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: inherit;
      white-space: nowrap; transition: background .15s;
    }
    .submit-btn:active { background: #3730a3; }
    .submit-btn:disabled { background: #c7d2fe; cursor: default; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 12px; padding: 12px 14px;
      border-radius: 12px; font-size: 13px; line-height: 1.6;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: var(--success-bg); color: #15803d; border: 1.5px solid #86efac; }
    .feedback.wrong   { background: var(--error-bg);   color: #b91c1c; border: 1.5px solid #fca5a5; }
    .feedback .fb-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .feedback .fb-answer { font-weight: 700; }

    /* ── Result Screen ── */
    #result-screen { display: none; padding: 16px; padding-bottom: 60px; }
    .result-hero {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      color: #fff; border-radius: 20px;
      padding: 32px 24px; text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(79,70,229,.35);
    }
    .result-hero .score-num { font-size: 64px; font-weight: 900; line-height: 1; }
    .result-hero .score-max { font-size: 18px; opacity: .8; }
    .result-hero .result-grade { font-size: 22px; font-weight: 700; margin-top: 12px; }
    .result-hero .result-sub   { font-size: 14px; opacity: .75; margin-top: 4px; }

    .result-section-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin: 20px 0 10px;
    }
    .wrong-card {
      background: #fff; border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
      border-left: 4px solid var(--error);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .wrong-card .wc-num  { font-size: 11px; color: var(--error); font-weight: 700; margin-bottom: 4px; }
    .wrong-card .wc-q    { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 6px; }
    .wrong-card .wc-mine { font-size: 13px; color: var(--error); }
    .wrong-card .wc-ans  { font-size: 13px; color: var(--success); font-weight: 700; margin-top: 2px; }
    .wrong-card .wc-exp  { font-size: 12px; color: var(--sub); margin-top: 6px; line-height: 1.5; }

    .btn-row { display: flex; gap: 10px; margin-top: 24px; }
    .btn-primary {
      flex: 1; height: 52px; background: var(--primary); color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: background .15s;
    }
    .btn-primary:active { background: #3730a3; }
    .btn-secondary {
      flex: 1; height: 52px; background: #fff; color: var(--primary);
      border: 2px solid var(--primary); border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s;
    }
    .btn-secondary:active { background: #ede9fe; }

    .all-correct-banner {
      text-align: center; padding: 20px;
      font-size: 18px; font-weight: 700; color: var(--success);
      background: var(--success-bg); border-radius: 14px;
    }
  </style>
</head>
<body>

<!-- ════════ QUIZ SCREEN ════════ -->
<div id="quiz-screen">

  <header>
    <h1>🔬 중3 과학 · 위치에너지 쪽지시험</h1>
    <p>질량 · 무게 · 일 · 위치에너지</p>
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progress-text">0 / 15 완료</span>
        <span id="score-text">0점</span>
      </div>
    </div>
  </header>

  <main>
    <!-- 공식 참고란 -->
    <div class="ref-box">
      <div class="ref-toggle" id="ref-toggle" onclick="toggleRef()">
        <span>📐 공식 참고란</span>
        <span class="arrow">▾</span>
      </div>
      <div class="ref-content" id="ref-content">
        <div class="ref-grid" style="margin-top:10px">
          <div class="ref-item"><strong>무게 (N)</strong><br>= 질량(kg) × 9.8</div>
          <div class="ref-item"><strong>일 W (J)</strong><br>= 힘 F(N) × 거리 s(m)</div>
          <div class="ref-item"><strong>위치에너지 (J)</strong><br>= 무게(N) × 높이(m)</div>
          <div class="ref-item"><strong>높이 (m)</strong><br>= 위치에너지 ÷ 무게</div>
        </div>
      </div>
    </div>

    <div id="questions-container" style="margin-top:16px"></div>
  </main>
</div>

<!-- ════════ RESULT SCREEN ════════ -->
<div id="result-screen">
  <div class="result-hero">
    <div class="score-num" id="r-score">0</div>
    <div class="score-max" id="r-max">/ 42점</div>
    <div class="result-grade" id="r-grade"></div>
    <div class="result-sub"  id="r-sub"></div>
  </div>

  <div id="wrong-section">
    <div class="result-section-title">❌ 틀린 문제 해설</div>
    <div id="wrong-list"></div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="restartAll()">처음부터</button>
    <button class="btn-primary" id="retry-wrong-btn" onclick="retryWrong()">틀린 문제만 다시</button>
  </div>
</div>

<script>
/* ═══════════════════ DATA ═══════════════════ */
const QUESTIONS = [
  // Part 1 – OX (각 2점)
  {
    id: 1, part: 'Part 1. O/X 퀴즈', type: 'ox', score: 2,
    text: '질량은 지구, 달, 화성 어디에서나 같다.',
    answer: 'O',
    explanation: '질량은 물체 자체의 물질의 양으로, 위치에 상관없이 항상 일정합니다.'
  },
  {
    id: 2, part: 'Part 1. O/X 퀴즈', type: 'ox', score: 2,
    text: '무게의 단위는 kg이다.',
    answer: 'X',
    explanation: 'kg은 질량의 단위입니다. 무게의 단위는 N(뉴턴)입니다.'
  },
  {
    id: 3, part: 'Part 1. O/X 퀴즈', type: 'ox', score: 2,
    text: '질량 1 kg인 물체의 지구에서의 무게는 9.8 N이다.',
    answer: 'O',
    explanation: '무게 = 1 kg × 9.8 = 9.8 N'
  },
  {
    id: 4, part: 'Part 1. O/X 퀴즈', type: 'ox', score: 2,
    text: 'W, F, s는 각각 일, 힘, 거리의 "단위"이다.',
    answer: 'X',
    explanation: 'W(Work), F(Force), s(distance)는 물리량의 이름(기호)입니다. 단위는 각각 J, N, m입니다.'
  },
  {
    id: 5, part: 'Part 1. O/X 퀴즈', type: 'ox', score: 2,
    text: '1 N의 힘으로 1 m를 이동시키면 한 일은 1 J이다.',
    answer: 'O',
    explanation: 'W = F × s = 1 N × 1 m = 1 J'
  },
  // Part 2 – MC (각 2점)
  {
    id: 6, part: 'Part 2. 객관식', type: 'mc', score: 2,
    text: '질량의 단위는 무엇인가요?',
    choices: ['N', 'kg', 'J', 'm'],
    answer: 'kg',
    explanation: '질량의 단위는 kg(킬로그램)입니다. N은 힘(무게), J는 일, m은 거리의 단위입니다.'
  },
  {
    id: 7, part: 'Part 2. 객관식', type: 'mc', score: 2,
    text: '무게의 단위는 무엇인가요?',
    choices: ['kg', 'm', 'N', 'J'],
    answer: 'N',
    explanation: '무게는 중력에 의한 힘이므로 단위는 N(뉴턴)입니다.'
  },
  {
    id: 8, part: 'Part 2. 객관식', type: 'mc', score: 2,
    text: '일(Work)의 단위는 무엇인가요?',
    choices: ['W', 'N', 'm', 'J'],
    answer: 'J',
    explanation: 'J(줄, Joule)이 일의 단위입니다. W는 일의 이름(기호)이지 단위가 아닙니다!'
  },
  // Part 3 – 무게 계산 (각 3점)
  {
    id: 9, part: 'Part 3. 계산 (무게)', type: 'num', score: 3,
    text: '질량 2 kg인 물체의 무게는 몇 N인가요?',
    unit: 'N', answer: 19.6,
    explanation: '무게 = 2 kg × 9.8 = 19.6 N'
  },
  {
    id: 10, part: 'Part 3. 계산 (무게)', type: 'num', score: 3,
    text: '질량 5 kg인 물체의 무게는 몇 N인가요?',
    unit: 'N', answer: 49,
    explanation: '무게 = 5 kg × 9.8 = 49 N'
  },
  // Part 4 – 일 계산 (각 3점)
  {
    id: 11, part: 'Part 4. 계산 (일)', type: 'num', score: 3,
    text: '10 N의 힘으로 물체를 5 m 이동시켰다. 한 일은 몇 J인가요?',
    unit: 'J', answer: 50,
    explanation: 'W = F × s = 10 N × 5 m = 50 J'
  },
  {
    id: 12, part: 'Part 4. 계산 (일)', type: 'num', score: 3,
    hint: '💡 들어올리는 힘 = 물체의 무게!',
    text: '질량 2 kg인 물체를 4 m 높이로 들어올렸다. 한 일은 몇 J인가요?',
    unit: 'J', answer: 78.4,
    explanation: '무게 = 2 × 9.8 = 19.6 N\nW = 19.6 N × 4 m = 78.4 J'
  },
  // Part 5 – 위치에너지 계산 (각 4점)
  {
    id: 13, part: 'Part 5. 계산 (위치에너지)', type: 'num', score: 4,
    text: '질량 1 kg인 공이 5 m 높이에 있다. 위치에너지는 몇 J인가요?',
    unit: 'J', answer: 49,
    explanation: '무게 = 1 × 9.8 = 9.8 N\n위치에너지 = 9.8 N × 5 m = 49 J'
  },
  {
    id: 14, part: 'Part 5. 계산 (위치에너지)', type: 'num', score: 4,
    text: '질량 3 kg인 물체가 10 m 높이에 있다. 위치에너지는 몇 J인가요?',
    unit: 'J', answer: 294,
    explanation: '무게 = 3 × 9.8 = 29.4 N\n위치에너지 = 29.4 N × 10 m = 294 J'
  },
  {
    id: 15, part: 'Part 5. 계산 (위치에너지)', type: 'num', score: 4,
    hint: '💡 높이 = 위치에너지 ÷ 무게',
    text: '위치에너지가 98 J이고 질량이 2 kg일 때, 몇 m 높이에 있는가?',
    unit: 'm', answer: 5,
    explanation: '무게 = 2 × 9.8 = 19.6 N\n높이 = 98 J ÷ 19.6 N = 5 m'
  },
];

const TOTAL_SCORE = QUESTIONS.reduce((s, q) => s + q.score, 0);

/* ═══════════════════ STATE ═══════════════════ */
let state = {
  answers: {},
  answered: new Set(),
  score: 0,
  activeIds: [],
};

/* ═══════════════════ INIT ═══════════════════ */
function init(ids) {
  state = { answers: {}, answered: new Set(), score: 0, activeIds: ids };

  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  let lastPart = '';
  QUESTIONS.filter(q => ids.includes(q.id)).forEach(q => {
    if (q.part !== lastPart) {
      lastPart = q.part;
      const label = document.createElement('div');
      label.className = 'part-label';
      label.textContent = q.part;
      container.appendChild(label);
    }
    container.appendChild(buildCard(q));
  });

  updateProgress();
}

/* ═══════════════════ BUILD CARD ═══════════════════ */
function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'card-' + q.id;

  let html = '<div class="q-num">문제 ' + q.id + '</div>';
  html += '<div class="q-score-badge">' + q.score + '점</div>';
  html += '<div class="q-text">' + q.text + '</div>';
  if (q.hint) html += '<div class="q-hint">' + q.hint + '</div>';

  if (q.type === 'ox') {
    html += '<div class="ox-wrap">'
      + '<button class="ox-btn" id="ox-O-' + q.id + '" onclick="answerOX(' + q.id + ',\'O\')">⭕</button>'
      + '<button class="ox-btn" id="ox-X-' + q.id + '" onclick="answerOX(' + q.id + ',\'X\')">❌</button>'
      + '</div>';
  } else if (q.type === 'mc') {
    const letters = ['①','②','③','④'];
    html += '<div class="mc-wrap">';
    q.choices.forEach(function(c, i) {
      html += '<button class="mc-btn" id="mc-' + q.id + '-' + i + '" onclick="answerMC(' + q.id + ',' + i + ')">'
        + '<span class="mc-letter">' + letters[i] + '</span>' + c + '</button>';
    });
    html += '</div>';
  } else {
    html += '<div class="num-wrap">'
      + '<input class="num-input" type="number" inputmode="decimal" id="num-' + q.id + '" placeholder="숫자 입력"'
      + ' onkeydown="if(event.key===\'Enter\')submitNum(' + q.id + ')" />'
      + '<span class="num-unit">' + q.unit + '</span>'
      + '<button class="submit-btn" id="sub-' + q.id + '" onclick="submitNum(' + q.id + ')">확인</button>'
      + '</div>';
  }

  html += '<div class="feedback" id="fb-' + q.id + '"></div>';
  card.innerHTML = html;
  return card;
}

/* ═══════════════════ ANSWER HANDLERS ═══════════════════ */
function answerOX(id, choice) {
  if (state.answered.has(id)) return;
  const q = QUESTIONS.find(function(x){ return x.id === id; });
  const correct = (choice === q.answer);
  recordAnswer(id, correct, choice);

  var btnO = document.getElementById('ox-O-' + id);
  var btnX = document.getElementById('ox-X-' + id);
  btnO.disabled = true;
  btnX.disabled = true;

  if (correct) {
    document.getElementById('ox-' + choice + '-' + id).classList.add('selected-correct');
  } else {
    document.getElementById('ox-' + choice + '-' + id).classList.add('selected-wrong');
    document.getElementById('ox-' + q.answer + '-' + id).classList.add('correct-highlight');
  }
  showFeedback(id, correct, q.answer, q.explanation);
}

function answerMC(id, idx) {
  if (state.answered.has(id)) return;
  const q = QUESTIONS.find(function(x){ return x.id === id; });
  const choice = q.choices[idx];
  const correct = (choice === q.answer);
  recordAnswer(id, correct, choice);

  q.choices.forEach(function(c, i) {
    var btn = document.getElementById('mc-' + id + '-' + i);
    btn.disabled = true;
    if (i === idx) btn.classList.add(correct ? 'selected-correct' : 'selected-wrong');
    if (!correct && c === q.answer) btn.classList.add('correct-highlight');
  });
  showFeedback(id, correct, q.answer, q.explanation);
}

function submitNum(id) {
  if (state.answered.has(id)) return;
  const q = QUESTIONS.find(function(x){ return x.id === id; });
  const input = document.getElementById('num-' + id);
  const raw = input.value.trim();
  if (!raw) { input.focus(); return; }

  const val = parseFloat(raw);
  const correct = (Math.abs(val - q.answer) < 0.001);
  recordAnswer(id, correct, raw);

  input.disabled = true;
  input.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById('sub-' + id).disabled = true;
  showFeedback(id, correct, q.answer + ' ' + q.unit, q.explanation);
}

/* ═══════════════════ HELPERS ═══════════════════ */
function recordAnswer(id, correct, userAnswer) {
  state.answered.add(id);
  state.answers[id] = { correct: correct, userAnswer: userAnswer };
  if (correct) state.score += QUESTIONS.find(function(q){ return q.id === id; }).score;

  document.getElementById('card-' + id).classList.add(correct ? 'answered-correct' : 'answered-wrong');
  updateProgress();

  if (state.answered.size === state.activeIds.length) {
    setTimeout(showResult, 800);
  }
}

function showFeedback(id, correct, answer, explanation) {
  const fb = document.getElementById('fb-' + id);
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  if (correct) {
    fb.innerHTML = '<div class="fb-title">✅ 정답!</div><div>' + explanation.replace(/\n/g,'<br>') + '</div>';
  } else {
    fb.innerHTML = '<div class="fb-title">❌ 틀렸어요</div>'
      + '<div class="fb-answer">정답: ' + answer + '</div>'
      + '<div style="margin-top:4px">' + explanation.replace(/\n/g,'<br>') + '</div>';
  }
  setTimeout(function(){ fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
}

function updateProgress() {
  const done = state.answered.size;
  const total = state.activeIds.length;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' 완료';
  document.getElementById('score-text').textContent = state.score + '점';
}

/* ═══════════════════ RESULT ═══════════════════ */
function showResult() {
  const maxScore = state.activeIds.reduce(function(s, id) {
    return s + QUESTIONS.find(function(q){ return q.id === id; }).score;
  }, 0);

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('r-score').textContent = state.score;
  document.getElementById('r-max').textContent = '/ ' + maxScore + '점';

  const pct = Math.round(state.score / maxScore * 100);
  let grade, sub;
  if      (pct === 100) { grade = '🏆 만점! 완벽해요!';     sub = '모든 문제를 맞혔습니다!'; }
  else if (pct >= 80)   { grade = '😊 우수!';               sub = '조금만 더 복습하면 완벽!'; }
  else if (pct >= 60)   { grade = '🙂 보통';                sub = '틀린 문제를 다시 풀어봐요'; }
  else                  { grade = '😅 분발 필요!';           sub = '공식을 다시 확인해봐요'; }

  document.getElementById('r-grade').textContent = grade;
  document.getElementById('r-sub').textContent = sub;

  const wrongIds = state.activeIds.filter(function(id){ return state.answers[id] && !state.answers[id].correct; });
  const wrongList = document.getElementById('wrong-list');
  const wrongSection = document.getElementById('wrong-section');
  wrongList.innerHTML = '';

  if (wrongIds.length === 0) {
    wrongSection.innerHTML = '<div class="all-correct-banner">🎉 모든 문제 정답! 훌륭해요!</div>';
    document.getElementById('retry-wrong-btn').style.display = 'none';
  } else {
    document.getElementById('retry-wrong-btn').style.display = '';
    wrongSection.querySelector('.result-section-title') || wrongSection.insertAdjacentHTML('afterbegin','<div class="result-section-title">❌ 틀린 문제 해설</div>');
    wrongIds.forEach(function(id) {
      const q = QUESTIONS.find(function(x){ return x.id === id; });
      const ua = state.answers[id].userAnswer;
      const div = document.createElement('div');
      div.className = 'wrong-card';
      div.innerHTML = '<div class="wc-num">문제 ' + q.id + ' (' + q.score + '점)</div>'
        + '<div class="wc-q">' + q.text + '</div>'
        + '<div class="wc-mine">내 답: ' + ua + '</div>'
        + '<div class="wc-ans">정답: ' + (q.type === 'num' ? q.answer + ' ' + q.unit : q.answer) + '</div>'
        + '<div class="wc-exp">' + q.explanation.replace(/\n/g,'<br>') + '</div>';
      wrongList.appendChild(div);
    });
  }
  window.scrollTo(0, 0);
}

/* ═══════════════════ ACTIONS ═══════════════════ */
function restartAll() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  // restore wrong-section markup
  document.getElementById('wrong-section').innerHTML =
    '<div class="result-section-title">❌ 틀린 문제 해설</div><div id="wrong-list"></div>';
  document.getElementById('retry-wrong-btn').style.display = '';
  init(QUESTIONS.map(function(q){ return q.id; }));
  window.scrollTo(0, 0);
}

function retryWrong() {
  const wrongIds = state.activeIds.filter(function(id){ return state.answers[id] && !state.answers[id].correct; });
  if (!wrongIds.length) return;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('wrong-section').innerHTML =
    '<div class="result-section-title">❌ 틀린 문제 해설</div><div id="wrong-list"></div>';
  document.getElementById('retry-wrong-btn').style.display = '';
  init(wrongIds);
  window.scrollTo(0, 0);
}

/* ═══════════════════ REF TOGGLE ═══════════════════ */
function toggleRef() {
  const toggle  = document.getElementById('ref-toggle');
  const content = document.getElementById('ref-content');
  toggle.classList.toggle('collapsed');
  content.classList.toggle('collapsed');
}

/* ═══════════════════ START ═══════════════════ */
init(QUESTIONS.map(function(q){ return q.id; }));
</script>
</body>
